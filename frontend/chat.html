<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UAR Chat</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="page-shell">
  <main class="chat-shell">
    <header class="panel-header">
      <div>
        <p class="eyebrow">Chat</p>
        <h1>Streaming interface</h1>
      </div>
      <a class="button secondary" href="index.html">Home</a>
    </header>
    <section id="chatLog" class="chat-log"></section>
    <form id="chatForm" class="chat-form">
      <input id="promptInput" type="text" placeholder="Ask UAR something..." autocomplete="off">
      <button class="button primary" type="submit">Send</button>
    </form>
  </main>
  <script src="js/app.js"></script>
</body>
</html>
