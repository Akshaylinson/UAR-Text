services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    environment:
      MODEL_NAME: TinyLlama/TinyLlama-1.1B-Chat-v1.0
      MAX_ACTIVE_LAYERS: 4
      CACHE_SIZE: 8
      LOG_LEVEL: INFO
      CORS_ORIGINS: "*"
    ports:
      - "0.0.0.0:8000:8000"
    volumes:
      - ./storage:/app/storage

